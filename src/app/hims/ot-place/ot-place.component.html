<div class="flex min-h-0 flex-1 flex-col bg-page">
  <!-- Header -->
  <div class="flex flex-wrap items-center gap-3 border-b border-border bg-primary px-4 py-3 text-[var(--app-toolbar-fg)]">
    <h2 class="text-lg font-semibold">OT Place Master</h2>
    <span class="flex-1"></span>
    <button type="button"
      class="inline-flex items-center gap-2 rounded-lg bg-accent px-4 py-2 text-sm font-medium text-white shadow hover:bg-accent-hover"
      (click)="openAdd()">
      <span class="material-icons text-lg">add</span>
      Add OT Place
    </button>
  </div>

  <div class="flex flex-1 flex-col gap-4 p-4">
    <div class="p-2">

      <!-- Loading -->
      <div *ngIf="loading" class="flex items-center gap-3 py-10 text-[#777]">
        <div class="h-9 w-9 animate-spin rounded-full border-2 border-[#e8dfd0] border-t-[#2d8a7e]"></div>
        <span class="text-sm">Loading…</span>
      </div>

      <!-- No Data -->
      <p *ngIf="!loading && items.length === 0" class="py-12 text-center text-sm text-[#999]">
        No OT places found.
      </p>

      <!-- Table -->
      <div *ngIf="!loading && items.length > 0" class="overflow-x-auto rounded-xl border border-[#e2e8f0]">
        <table class="w-full min-w-[800px] border-collapse text-left text-sm">
          <thead>
            <tr class="border-b border-[#eee] bg-[#f8faff] text-[#666]">
              <th class="px-3 py-3 text-xs font-semibold uppercase tracking-wide w-16">ID</th>
              <th class="px-3 py-3 text-xs font-semibold uppercase tracking-wide">Department</th>
              <th class="px-3 py-3 text-xs font-semibold uppercase tracking-wide">Operation Place</th>
              <th class="px-3 py-3 text-xs font-semibold uppercase tracking-wide">User</th>
              <th class="px-3 py-3 text-xs font-semibold uppercase tracking-wide w-24">Actions</th>
            </tr>
            <!-- Search row -->
            <tr class="border-b border-[#e2e8f0] bg-[#f8faff]">
              <td class="px-3 py-1">
                <input [(ngModel)]="search.id" (ngModelChange)="onSearchChange()"
                  class="w-full rounded border border-[#e5e5e5] px-2 py-1 text-xs" placeholder="Search" />
              </td>
              <td class="px-3 py-1">
                <input [(ngModel)]="search.deptname" (ngModelChange)="onSearchChange()"
                  class="w-full rounded border border-[#e5e5e5] px-2 py-1 text-xs" placeholder="Search" />
              </td>
              <td class="px-3 py-1">
                <input [(ngModel)]="search.place" (ngModelChange)="onSearchChange()"
                  class="w-full rounded border border-[#e5e5e5] px-2 py-1 text-xs" placeholder="Search" />
              </td>
              <td class="px-3 py-1">
                <input [(ngModel)]="search.userx" (ngModelChange)="onSearchChange()"
                  class="w-full rounded border border-[#e5e5e5] px-2 py-1 text-xs" placeholder="Search" />
              </td>
              <td class="px-3 py-1">
                <input disabled class="w-full rounded border border-[#eee] bg-gray-100 px-2 py-1 text-xs" placeholder="—" />
              </td>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let i of paged" class="border-b border-[#f5f0e8] transition hover:bg-[#f8faff]">
              <td class="px-3 py-2.5 tabular-nums text-xs text-[#888]">{{ i.Pk_id }}</td>
              <td class="px-3 py-2.5 font-medium text-[#333]">{{ i.Deptname }}</td>
              <td class="px-3 py-2.5 text-xs text-[#666]">{{ i.Place }}</td>
              <td class="px-3 py-2.5 text-xs text-[#666]">{{ i.Userx }}</td>
              <td class="px-3 py-2.5">
                <div class="flex items-center gap-1">
                  <button type="button" (click)="openEdit(i)"
                    class="rounded-lg p-1.5 text-[#4680ff] transition hover:bg-[#e8eeff]" title="Edit">
                    <span class="material-icons text-[18px]">edit</span>
                  </button>
                  <button type="button" (click)="deleteOtplace(i)"
                    class="rounded-lg p-1.5 text-[#e05252] transition hover:bg-[#fdeaea]" title="Delete">
                    <span class="material-icons text-[18px]">delete</span>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div *ngIf="!loading && filtered.length > pageSize"
        class="mt-4 flex items-center justify-center gap-2 text-sm">
        <button (click)="currentPage = currentPage - 1" [disabled]="currentPage === 1"
          class="rounded border px-3 py-1 disabled:opacity-40 hover:bg-[#f0f2f5]">Prev</button>
        <span class="text-[#666]">Page {{ currentPage }} of {{ totalPages }}</span>
        <button (click)="currentPage = currentPage + 1" [disabled]="currentPage === totalPages"
          class="rounded border px-3 py-1 disabled:opacity-40 hover:bg-[#f0f2f5]">Next</button>
      </div>

    </div>
  </div>
</div>
