<div class="flex w-full flex-col bg-white" style="max-height: 90vh; width: 900px">
  <!-- Header -->
  <div class="flex items-center gap-3 border-b border-[#e2e8f0] bg-[#f8faff] px-5 py-4">
    <span class="material-icons text-[var(--app-primary)]">{{ isEdit ? 'edit' : 'add_circle' }}</span>
    <h3 class="text-base font-semibold text-[#333]">{{ isEdit ? 'Edit OT Place' : 'Add OT Place' }}</h3>
    <span class="flex-1"></span>
    <button type="button" class="rounded p-1 hover:bg-[#eee]" (click)="onCancel()" aria-label="Close">
      <span class="material-icons text-[#999]">close</span>
    </button>
  </div>

  <!-- Body -->
  <div class="flex-1 overflow-y-auto p-5">
    <form [formGroup]="form">
      <fieldset class="mb-5 rounded-lg border border-[#e2e8f0] p-4">
        <legend class="px-1 text-xs font-semibold uppercase tracking-wide text-[var(--app-primary)]">OT Place</legend>
        <div class="grid grid-cols-2 gap-4 md:grid-cols-3">
          <div>
            <label class="mb-1 block text-xs font-semibold text-[#666]">Department</label>
            <app-autocomplete
              [items]="deptList"
              formControlName="Dept_id"
              placeholder="Search department…">
            </app-autocomplete>
          </div>
          <div>
            <label class="mb-1 block text-xs font-semibold text-[#666]">Operation Place</label>
            <input formControlName="Place" type="text" maxlength="10" class="w-full rounded-lg border border-[#e5e5e5] px-3 py-2 text-sm" />
          </div>
          <div>
            <label class="mb-1 block text-xs font-semibold text-[#666]">Userx</label>
            <input formControlName="Userx" type="text" maxlength="100" class="w-full rounded-lg border border-[#e5e5e5] px-3 py-2 text-sm" />
          </div>
          <div>
            <label class="mb-1 block text-xs font-semibold text-[#666]">Billing Mode</label>
            <select formControlName="BillMode" class="w-full rounded-lg border border-[#e5e5e5] px-3 py-2 text-sm">
              <option *ngFor="let o of billModeList" [ngValue]="o.cd">{{ o.nm }}</option>
            </select>
          </div>
        </div>
      </fieldset>
    </form>

    <!-- Nested Operating Tables management -->
    <fieldset *ngIf="isEdit" class="rounded-lg border border-[#e2e8f0] p-4">
      <legend class="px-1 text-xs font-semibold uppercase tracking-wide text-[var(--app-primary)]">Operating Tables</legend>

      <div class="overflow-x-auto">
        <table class="w-full min-w-[820px] border-collapse text-left text-sm">
          <thead>
            <tr class="border-b border-[#eee] bg-[#f8faff] text-[#666]">
              <th class="px-2 py-2 text-xs font-semibold uppercase tracking-wide w-20">Table No</th>
              <th class="px-2 py-2 text-xs font-semibold uppercase tracking-wide w-32">Name</th>
              <th class="px-2 py-2 text-xs font-semibold uppercase tracking-wide w-14 text-center">Supra</th>
              <th class="px-2 py-2 text-xs font-semibold uppercase tracking-wide w-14 text-center">Major</th>
              <th class="px-2 py-2 text-xs font-semibold uppercase tracking-wide w-14 text-center">Minor</th>
              <th class="px-2 py-2 text-xs font-semibold uppercase tracking-wide w-14 text-center">Proc.</th>
              <th class="px-2 py-2 text-xs font-semibold uppercase tracking-wide w-14 text-center">Inv</th>
              <th class="px-2 py-2 text-xs font-semibold uppercase tracking-wide w-14 text-center">Active</th>
              <th class="px-2 py-2 text-xs font-semibold uppercase tracking-wide">Departments</th>
              <th class="px-2 py-2 text-xs font-semibold uppercase tracking-wide w-20">Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let t of tables" class="border-b border-[#f5f0e8]">
              <td class="px-2 py-2">
                <input [(ngModel)]="t.TableNo" [ngModelOptions]="{standalone: true}" class="w-full rounded border border-[#e5e5e5] px-2 py-1 text-xs" />
              </td>
              <td class="px-2 py-2">
                <input [(ngModel)]="t.TableName" [ngModelOptions]="{standalone: true}" class="w-full rounded border border-[#e5e5e5] px-2 py-1 text-xs" />
              </td>
              <td class="px-2 py-2 text-center"><input type="checkbox" [(ngModel)]="t.Supra" [ngModelOptions]="{standalone: true}" /></td>
              <td class="px-2 py-2 text-center"><input type="checkbox" [(ngModel)]="t.Major" [ngModelOptions]="{standalone: true}" /></td>
              <td class="px-2 py-2 text-center"><input type="checkbox" [(ngModel)]="t.Minor" [ngModelOptions]="{standalone: true}" /></td>
              <td class="px-2 py-2 text-center"><input type="checkbox" [(ngModel)]="t.Procx" [ngModelOptions]="{standalone: true}" /></td>
              <td class="px-2 py-2 text-center"><input type="checkbox" [(ngModel)]="t.Invx" [ngModelOptions]="{standalone: true}" /></td>
              <td class="px-2 py-2 text-center"><input type="checkbox" [(ngModel)]="t.IsActive" [ngModelOptions]="{standalone: true}" /></td>
              <td class="px-2 py-2">
                <label *ngFor="let d of deptList" class="mr-2 inline-flex items-center gap-1 text-xs text-[#333]">
                  <input type="checkbox" [checked]="isDeptChecked(t, +d.id)" (click)="toggleDept(t, +d.id)" />
                  {{ d.nm }}
                </label>
              </td>
              <td class="px-2 py-2 whitespace-nowrap">
                <button type="button" (click)="saveTable(t)" class="rounded-lg p-1.5 text-green-600 hover:bg-green-50" title="Save">
                  <span class="material-icons text-[18px]">save</span>
                </button>
                <button type="button" (click)="deleteTable(t)" class="rounded-lg p-1.5 text-[#e05252] hover:bg-[#fdeaea]" title="Delete">
                  <span class="material-icons text-[18px]">delete</span>
                </button>
              </td>
            </tr>
            <tr *ngIf="tables.length === 0">
              <td colspan="10" class="px-2 py-4 text-center text-xs text-[#999]">No operating tables yet.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <button type="button"
        class="mt-3 inline-flex items-center gap-1 rounded-lg border border-[#e5e5e5] px-3 py-1.5 text-xs font-medium text-[#333] hover:bg-[#f5f5f5]"
        (click)="addTable()">
        <span class="material-icons text-[16px]">add</span>
        Add Table
      </button>
    </fieldset>
  </div>

  <!-- Footer -->
  <div class="flex items-center gap-2 border-t border-[#e2e8f0] px-5 py-4">
    <span class="flex-1"></span>
    <button type="button"
      class="rounded-lg border border-[#e5e5e5] px-4 py-2 text-sm text-[#666] hover:bg-[#f5f5f5]"
      (click)="onCancel()">
      Close
    </button>
    <button type="button"
      class="inline-flex items-center gap-1 rounded-lg bg-[var(--app-primary)] px-5 py-2 text-sm font-medium text-white shadow hover:bg-[var(--app-primary-dark)] disabled:opacity-50"
      (click)="onSave()" [disabled]="saving">
      <span class="material-icons text-[16px]">save</span>
      {{ saving ? 'Saving…' : 'Save' }}
    </button>
  </div>
</div>
