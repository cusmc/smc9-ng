<div class="flex w-full flex-col bg-white" style="min-width:320px">
  <!-- Header -->
  <div class="flex items-center gap-3 border-b border-[#e2e8f0] bg-[#f8faff] px-5 py-4">
    <span class="material-icons text-slate-500">face</span>
    <div>
      <h3 class="text-base font-semibold text-[#333]">Employee Photo</h3>
      <p class="text-xs text-[#888]">{{ data.FullName }} ({{ data.UserName }})</p>
    </div>
    <span class="flex-1"></span>
    <button type="button" class="rounded p-1 hover:bg-[#eee]" (click)="onClose()" aria-label="Close">
      <span class="material-icons text-[#999]">close</span>
    </button>
  </div>

  <!-- Photo area -->
  <div class="flex items-center justify-center px-8 py-8">
    <div *ngIf="loading" class="flex flex-col items-center gap-3 text-[#777]">
      <div class="h-9 w-9 animate-spin rounded-full border-2 border-[#e8dfd0] border-t-[#2d8a7e]"></div>
      <span class="text-sm">Loading photo…</span>
    </div>

    <div *ngIf="!loading && photoUrl">
      <img [src]="photoUrl" alt="Employee photo"
        class="h-64 w-48 rounded-xl object-cover shadow-md border border-[#e5e5e5]" />
    </div>

    <div *ngIf="!loading && !photoUrl"
      class="flex h-64 w-48 flex-col items-center justify-center rounded-xl border-2 border-dashed border-[#e5e5e5] text-[#bbb]">
      <span class="material-icons text-[64px]">account_circle</span>
      <span class="mt-2 text-sm">No photo available</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="flex items-center justify-end gap-2 border-t border-[#e2e8f0] px-5 py-4">
    <button type="button"
      class="rounded-lg border border-[#e5e5e5] px-4 py-2 text-sm text-[#666] hover:bg-[#f5f5f5]"
      (click)="onClose()">
      Close
    </button>
  </div>
</div>
