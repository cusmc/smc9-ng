<div class="flex w-full flex-col bg-white" style="width: 600px">
  <!-- Header -->
  <div class="flex items-center gap-3 border-b border-[#f0ebe3] bg-[#faf8f3] px-5 py-4">
    <span class="material-icons text-[var(--app-primary)]">history</span>
    <h3 class="text-base font-semibold text-[#333]">Change History — Webpage #{{ webpageId }}</h3>
    <span class="flex-1"></span>
    <button type="button" class="rounded p-1 hover:bg-[#eee]" (click)="close()" aria-label="Close">
      <span class="material-icons text-[#999]">close</span>
    </button>
  </div>

  <!-- Body -->
  <div class="flex flex-col items-center justify-center gap-3 px-5 py-16 text-[#999]">
    <span class="material-icons text-5xl">manage_history</span>
    <p class="text-sm">Change history coming soon.</p>
    <p class="text-xs">Audit records are captured automatically on every save.</p>
  </div>

  <!-- Footer -->
  <div class="flex justify-end border-t border-[#f0ebe3] px-5 py-4">
    <button type="button"
      class="rounded-lg border border-[#e5e5e5] px-4 py-2 text-sm text-[#666] hover:bg-[#f5f5f5]"
      (click)="close()">
      Close
    </button>
  </div>
</div>
