<div class="flex w-full flex-col bg-white" style="max-height:90vh">
  <!-- Dialog header -->
  <div class="flex items-center gap-3 border-b border-[#e2e8f0] bg-[#f8faff] px-5 py-4">
    <span class="material-icons text-[var(--app-primary)]">{{ isEdit ? 'edit' : 'add_circle' }}</span>
    <h3 class="text-base font-semibold text-[#333]">{{ isEdit ? 'Edit Web Module' : 'Add Web Module' }}</h3>
    <span class="flex-1"></span>
    <button type="button" class="rounded p-1 hover:bg-[#eee]" (click)="onCancel()" aria-label="Close">
      <span class="material-icons text-[#999]">close</span>
    </button>
  </div>

  <!-- Form body -->
  <form [formGroup]="form" (ngSubmit)="onSave()" class="flex flex-col gap-4 overflow-y-auto p-5">
    <!-- Module Name -->
    <div>
      <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-[#666]">Module Name <span class="text-red-500">*</span></label>
      <input formControlName="Wmodule_nm" type="text"
        class="w-full rounded-lg border border-[#e5e5e5] px-3 py-2 text-sm focus:border-[var(--app-primary)] focus:outline-none focus:ring-2 focus:ring-[var(--app-primary-soft)]"
        placeholder="e.g. Patient Record" />
      <p *ngIf="form.get('Wmodule_nm')?.invalid && form.get('Wmodule_nm')?.touched"
        class="mt-1 text-xs text-red-500">Module name is required.</p>
    </div>

    <!-- Controller Name -->
    <div>
      <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-[#666]">Controller Name <span class="text-red-500">*</span></label>
      <input formControlName="Cont_name" type="text"
        class="w-full rounded-lg border border-[#e5e5e5] px-3 py-2 text-sm focus:border-[var(--app-primary)] focus:outline-none focus:ring-2 focus:ring-[var(--app-primary-soft)]"
        placeholder="e.g. HMSmast" />
      <p *ngIf="form.get('Cont_name')?.invalid && form.get('Cont_name')?.touched"
        class="mt-1 text-xs text-red-500">Controller name is required.</p>
    </div>

    <!-- View Name -->
    <div>
      <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-[#666]">View Name <span class="text-red-500">*</span></label>
      <input formControlName="View_name" type="text"
        class="w-full rounded-lg border border-[#e5e5e5] px-3 py-2 text-sm focus:border-[var(--app-primary)] focus:outline-none focus:ring-2 focus:ring-[var(--app-primary-soft)]"
        placeholder="e.g. EMR" />
      <p *ngIf="form.get('View_name')?.invalid && form.get('View_name')?.touched"
        class="mt-1 text-xs text-red-500">View name is required.</p>
    </div>

    <!-- Params -->
    <div>
      <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-[#666]">Params</label>
      <input formControlName="Params" type="text"
        class="w-full rounded-lg border border-[#e5e5e5] px-3 py-2 text-sm focus:border-[var(--app-primary)] focus:outline-none focus:ring-2 focus:ring-[var(--app-primary-soft)]"
        placeholder="Optional query parameters" />
    </div>

    <!-- Portal -->
    <div>
      <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-[#666]">Portal ID</label>
      <input formControlName="Portal_id" type="number"
        class="w-full rounded-lg border border-[#e5e5e5] px-3 py-2 text-sm focus:border-[var(--app-primary)] focus:outline-none focus:ring-2 focus:ring-[var(--app-primary-soft)]"
        placeholder="Optional" />
    </div>

    <div class="border-t border-[#eee] pt-4">
      <p class="mb-3 text-xs font-semibold uppercase tracking-wide text-[#2d7a6e]">Dynamic Menu Placement</p>

      <!-- Show In Menu -->
      <label class="mb-3 flex items-center gap-2 text-sm text-[#444]">
        <input formControlName="ShowInMenu" type="checkbox"
          class="h-3.5 w-3.5 accent-[var(--app-primary)]" />
        Show this item in the app menu
      </label>

      <!-- Nav Module -->
      <div class="mb-3">
        <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-[#666]">Menu Module</label>
        <select formControlName="NavModule_Subcode_id"
          class="w-full rounded-lg border border-[#e5e5e5] px-3 py-2 text-sm focus:border-[var(--app-primary)] focus:outline-none focus:ring-2 focus:ring-[var(--app-primary-soft)]">
          <option [ngValue]="null">— None —</option>
          <option *ngFor="let g of menuGroups" [ngValue]="g.SubCode_id">{{ g.vals }}</option>
        </select>
      </div>

      <!-- Nav Group Label -->
      <div class="mb-3">
        <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-[#666]">Sidebar Section</label>
        <input formControlName="NavGroupLabel" type="text" list="navGroupLabelList"
          (change)="onGroupLabelPicked($any($event.target).value)"
          class="w-full rounded-lg border border-[#e5e5e5] px-3 py-2 text-sm focus:border-[var(--app-primary)] focus:outline-none focus:ring-2 focus:ring-[var(--app-primary-soft)]"
          placeholder="e.g. Masters, Reports — pick existing or type a new one" />
        <datalist id="navGroupLabelList">
          <option *ngFor="let g of groupLabels" [value]="g.Label"></option>
        </datalist>
      </div>

      <div class="mb-3 grid grid-cols-2 gap-3">
        <div>
          <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-[#666]">Section Icon</label>
          <input formControlName="NavGroupIcon" type="text"
            class="w-full rounded-lg border border-[#e5e5e5] px-3 py-2 text-sm focus:border-[var(--app-primary)] focus:outline-none focus:ring-2 focus:ring-[var(--app-primary-soft)]"
            placeholder="material icon name" />
        </div>
        <div>
          <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-[#666]">Item Icon</label>
          <input formControlName="NavIcon" type="text"
            class="w-full rounded-lg border border-[#e5e5e5] px-3 py-2 text-sm focus:border-[var(--app-primary)] focus:outline-none focus:ring-2 focus:ring-[var(--app-primary-soft)]"
            placeholder="material icon name" />
        </div>
      </div>

      <!-- Angular Route -->
      <div>
        <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-[#666]">Angular Route</label>
        <input formControlName="NgRoute" type="text"
          class="w-full rounded-lg border border-[#e5e5e5] px-3 py-2 text-sm focus:border-[var(--app-primary)] focus:outline-none focus:ring-2 focus:ring-[var(--app-primary-soft)]"
          placeholder="/elogbook/activities — leave blank for legacy /Controller/View" />
      </div>
    </div>
  </form>

  <!-- Footer buttons -->
  <div class="flex items-center gap-2 border-t border-[#e2e8f0] px-5 py-4">
    <button *ngIf="isEdit" type="button"
      class="inline-flex items-center gap-1 rounded-lg border border-red-200 px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 disabled:opacity-50"
      (click)="onDelete()" [disabled]="deleting">
      <span class="material-icons text-[16px]">delete</span>
      {{ deleting ? 'Deleting…' : 'Delete' }}
    </button>
    <span class="flex-1"></span>
    <button type="button"
      class="rounded-lg border border-[#e5e5e5] px-4 py-2 text-sm text-[#666] hover:bg-[#f5f5f5]"
      (click)="onCancel()">
      Cancel
    </button>
    <button type="button"
      class="inline-flex items-center gap-1 rounded-lg bg-[var(--app-primary)] px-5 py-2 text-sm font-medium text-white shadow hover:bg-[var(--app-primary-dark)] disabled:opacity-50"
      (click)="onSave()" [disabled]="saving">
      <span class="material-icons text-[16px]">save</span>
      {{ saving ? 'Saving…' : 'Save' }}
    </button>
  </div>
</div>
