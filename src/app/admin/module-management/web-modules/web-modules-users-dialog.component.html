<div class="flex w-full flex-col bg-white" style="max-height:90vh">
  <!-- Header -->
  <div class="flex items-center gap-3 border-b border-[#f0ebe3] bg-[#faf8f3] px-5 py-4">
    <span class="material-icons text-[var(--app-primary)]">people</span>
    <div>
      <h3 class="text-base font-semibold text-[#333]">User Rights</h3>
      <p class="text-xs text-[#888]">{{ data.Wmodule_nm }}</p>
    </div>
    <span class="flex-1"></span>
    <button type="button" class="rounded p-1 hover:bg-[#eee]" (click)="onClose()" aria-label="Close">
      <span class="material-icons text-[#999]">close</span>
    </button>
  </div>

  <!-- Table body -->
  <div class="flex-1 overflow-y-auto px-5 py-3">
    <!-- Loading -->
    <div *ngIf="loading" class="flex items-center gap-3 py-8 text-[#777]">
      <div class="h-7 w-7 animate-spin rounded-full border-2 border-[#e8dfd0] border-t-[#2d8a7e]"></div>
      <span class="text-sm">Loading users…</span>
    </div>

    <div *ngIf="!loading" class="overflow-x-auto rounded-xl border border-[#f0ebe3]">
      <table class="w-full border-collapse text-left text-sm">
        <thead>
          <!-- Column labels -->
          <tr class="bg-[#faf8f3] text-[#666]">
            <th class="border border-[#e8e0d4] px-3 py-2.5 text-xs font-semibold uppercase tracking-wide">User ID</th>
            <th class="border border-[#e8e0d4] px-3 py-2.5 text-xs font-semibold uppercase tracking-wide">Full Name</th>
            <th class="border border-[#e8e0d4] px-3 py-2.5 text-xs font-semibold uppercase tracking-wide">Department</th>
            <th class="border border-[#e8e0d4] px-3 py-2.5 text-xs font-semibold uppercase tracking-wide">Category</th>
            <th *ngFor="let lbl of labels"
              class="border border-[#e8e0d4] px-2 py-2.5 text-center text-xs font-semibold uppercase tracking-wide whitespace-nowrap">
              {{ lbl }}
            </th>
          </tr>
          <!-- Column filters -->
          <tr class="bg-white">
            <th class="border border-[#e8e0d4] px-2 py-1.5">
              <input type="search" [(ngModel)]="filterUserId" (ngModelChange)="resetPage()"
                class="w-full rounded border border-[#e5e5e5] px-2 py-1 text-xs font-normal focus:border-[var(--app-primary)] focus:outline-none"
                placeholder="User ID…" />
            </th>
            <th class="border border-[#e8e0d4] px-2 py-1.5">
              <input type="search" [(ngModel)]="filterName" (ngModelChange)="resetPage()"
                class="w-full rounded border border-[#e5e5e5] px-2 py-1 text-xs font-normal focus:border-[var(--app-primary)] focus:outline-none"
                placeholder="Name…" />
            </th>
            <th class="border border-[#e8e0d4] px-2 py-1.5">
              <input type="search" [(ngModel)]="filterDept" (ngModelChange)="resetPage()"
                class="w-full rounded border border-[#e5e5e5] px-2 py-1 text-xs font-normal focus:border-[var(--app-primary)] focus:outline-none"
                placeholder="Department…" />
            </th>
            <th class="border border-[#e8e0d4] px-2 py-1.5">
              <input type="search" [(ngModel)]="filterCategory" (ngModelChange)="resetPage()"
                class="w-full rounded border border-[#e5e5e5] px-2 py-1 text-xs font-normal focus:border-[var(--app-primary)] focus:outline-none"
                placeholder="Category…" />
            </th>
            <th *ngFor="let lbl of labels" class="border border-[#e8e0d4]"></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of pagedUsers" class="hover:bg-[#faf8f3]">
            <td class="border border-[#e8e0d4] px-3 py-2 text-xs text-[#888] font-mono">{{ u.UserName }}</td>
            <td class="border border-[#e8e0d4] px-3 py-2 font-medium text-[#333]">{{ u.FullName }}</td>
            <td class="border border-[#e8e0d4] px-3 py-2 text-[#555]">{{ u.Deptnm }}</td>
            <td class="border border-[#e8e0d4] px-3 py-2 text-[#666]">{{ u.category }}</td>
            <td *ngFor="let lbl of labels; let j = index"
              class="border border-[#e8e0d4] px-2 py-2 text-center">
              <input type="checkbox"
                [(ngModel)]="u.checks![j]"
                class="h-3.5 w-3.5 accent-[var(--app-primary)]" />
            </td>
          </tr>
          <tr *ngIf="pagedUsers.length === 0">
            <td [attr.colspan]="4 + labels.length" class="border border-[#e8e0d4] px-3 py-8 text-center text-sm text-[#999]">No users found.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div *ngIf="totalPages > 1" class="mt-3 flex items-center justify-between text-xs text-[#999]">
      <span>{{ filteredUsers.length }} users</span>
      <div class="flex items-center gap-2">
        <button (click)="prevPage()" [disabled]="currentPage === 1"
          class="rounded border px-3 py-1 disabled:opacity-40 hover:bg-[#f5f0e8]">Prev</button>
        <span class="text-[#666]">Page {{ currentPage }} of {{ totalPages }}</span>
        <button (click)="nextPage()" [disabled]="currentPage === totalPages"
          class="rounded border px-3 py-1 disabled:opacity-40 hover:bg-[#f5f0e8]">Next</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="flex items-center justify-end gap-2 border-t border-[#f0ebe3] px-5 py-4">
    <button type="button"
      class="rounded-lg border border-[#e5e5e5] px-4 py-2 text-sm text-[#666] hover:bg-[#f5f5f5]"
      (click)="onClose()">
      Close
    </button>
    <button type="button"
      class="inline-flex items-center gap-1 rounded-lg bg-[var(--app-primary)] px-5 py-2 text-sm font-medium text-white shadow hover:bg-[var(--app-primary-dark)] disabled:opacity-50"
      (click)="onSave()" [disabled]="saving || loading">
      <span class="material-icons text-[16px]">save</span>
      {{ saving ? 'Saving…' : 'Save Rights' }}
    </button>
  </div>
</div>
