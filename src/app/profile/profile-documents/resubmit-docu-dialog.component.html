<div class="flex flex-col bg-white" style="width:480px; max-width:95vw;">

  <!-- Header -->
  <div class="flex items-center gap-3 border-b border-[#e2e8f0] bg-[#f8faff] px-5 py-4">
    <span class="material-icons text-[#c8a96a]">upload_file</span>
    <div>
      <h3 class="text-base font-semibold text-[#333]">Resubmit Document</h3>
      <p class="text-xs text-[#888]">{{ data.doc.DocType }}</p>
    </div>
    <span class="flex-1"></span>
    <button type="button" class="rounded p-1 hover:bg-[#eee]" (click)="onClose()" aria-label="Close">
      <span class="material-icons text-[#999]">close</span>
    </button>
  </div>

  <!-- Body -->
  <div class="flex flex-col gap-4 px-5 py-5">

    <!-- Description -->
    <div>
      <label class="mb-1 block text-xs font-semibold text-[#555]">Description</label>
      <input type="text" [(ngModel)]="description" placeholder="Optional description"
        class="w-full rounded-lg border border-[#e5e5e5] px-3 py-2 text-sm focus:border-[#2d8a7e] focus:outline-none" />
    </div>

    <!-- Page number -->
    <div>
      <label class="mb-1 block text-xs font-semibold text-[#555]">Page Number <span class="font-normal text-[#aaa]">(optional)</span></label>
      <input type="number" [(ngModel)]="pageNo" min="1" placeholder="e.g. 1"
        class="w-24 rounded-lg border border-[#e5e5e5] px-3 py-2 text-sm focus:border-[#2d8a7e] focus:outline-none" />
    </div>

    <!-- File drop zone -->
    <div>
      <label class="mb-1 block text-xs font-semibold text-[#555]">Replacement File <span class="text-red-500">*</span></label>

      <input #fileInput type="file" class="hidden"
        accept=".jpg,.jpeg,.png,.pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,.ppt,.pptx"
        (change)="onFilePick($event)" />

      <div *ngIf="!pickedFile"
        class="flex cursor-pointer flex-col items-center justify-center gap-2 rounded-xl border-2 border-dashed px-4 py-8 text-center transition-all"
        [class.border-[#2d8a7e]]="isDragOver"
        [class.bg-[#f0faf8]]="isDragOver"
        [class.border-[#d5cfc8]]="!isDragOver"
        [class.bg-[#faf8f3]]="!isDragOver"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave()"
        (drop)="onDrop($event)"
        (click)="openPicker()">
        <span class="material-icons text-4xl"
          [class.text-[#2d8a7e]]="isDragOver"
          [class.text-[#c8a96a]]="!isDragOver">cloud_upload</span>
        <p class="text-sm font-medium text-[#444]">
          Drop file here, or <span class="text-[#2d8a7e] underline">click to browse</span>
        </p>
        <p class="text-xs text-[#aaa]">Max 10 MB</p>
      </div>

      <!-- Picked file row -->
      <div *ngIf="pickedFile"
        class="flex items-center gap-3 rounded-lg border border-[#e5e5e5] bg-[#fafafa] px-4 py-3">
        <span class="material-icons text-[20px] text-[#c8a96a]">insert_drive_file</span>
        <div class="min-w-0 flex-1">
          <p class="truncate text-sm font-medium text-[#333]">{{ pickedFile.name }}</p>
          <p class="text-xs text-[#aaa]">{{ (pickedFile.size / 1024 / 1024).toFixed(2) }} MB</p>
          <p *ngIf="typeError()" class="text-xs text-red-500">{{ typeError() }}</p>
        </div>
        <button type="button" (click)="pickedFile = null"
          class="rounded p-1 text-[#ccc] hover:bg-red-50 hover:text-red-400">
          <span class="material-icons text-[18px]">close</span>
        </button>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="flex items-center justify-end gap-3 border-t border-[#e2e8f0] px-5 py-3">
    <button type="button" (click)="onClose()"
      class="rounded-lg border border-[#e5e5e5] px-4 py-2 text-sm text-[#666] hover:bg-[#f5f5f5]">
      Cancel
    </button>
    <button type="button" (click)="submit()" [disabled]="uploading || !pickedFile || !!typeError()"
      class="inline-flex items-center gap-2 rounded-lg bg-[#c8a96a] px-5 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-[#a8893a] disabled:opacity-50">
      <span class="material-icons text-[18px]">{{ uploading ? 'hourglass_empty' : 'upload_file' }}</span>
      {{ uploading ? 'Uploading&hellip;' : 'Resubmit' }}
    </button>
  </div>

</div>
