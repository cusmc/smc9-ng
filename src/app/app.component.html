<ng-container *ngIf="!isLoggedIn || isLoginPage">
  <router-outlet />
</ng-container>

<ng-container *ngIf="isLoggedIn && !isLoginPage">
  <!-- Mobile drawer backdrop -->
  <div
    *ngIf="sidenavOpen"
    class="fixed inset-0 z-40 bg-primary-dark/50 xl:hidden"
    (click)="sidenavOpen = false"
    aria-hidden="true"
  ></div>

  <div class="flex h-screen overflow-hidden bg-page">
    <!-- Dual-panel nav: icon rail + contextual sidebar -->
    <div
      class="fixed inset-y-0 left-0 z-50 flex transition-transform duration-200"
      [style.transform]="sidenavOpen ? 'translateX(0)' : 'translateX(-100%)'"
    >
      <!-- Module icon rail -->
      <app-module-rail
        [modules]="visibleModules"
        [activeModuleId]="activeModule?.id ?? null"
        (moduleSelected)="onModuleSelected($event)"
      />

      <!-- Contextual sidebar panel -->
      <app-sidebar
        [module]="activeModule"
        [open]="sidenavOpen"
        (closeMobile)="closeSidenavOnMobile()"
      />
    </div>

    <!-- Main content -->
    <div
      class="flex min-w-0 flex-1 flex-col transition-[margin] duration-200"
      [style.margin-left.px]="sidenavOpen ? 276 : 0"
    >
      <header
        class="sticky top-0 z-30 flex h-14 shrink-0 items-center gap-2 border-b border-primary-soft bg-primary px-2 text-[var(--app-toolbar-fg)] shadow-md sm:px-3"
      >
        <button
          type="button"
          class="rounded-md p-2 hover:bg-white/10"
          (click)="sidenavOpen = !sidenavOpen"
          aria-label="Toggle menu"
        >
          <span class="material-icons">menu</span>
        </button>
        <span class="flex-1"></span>
        <button
          type="button"
          class="rounded-md p-2 opacity-80 hover:bg-white/10"
          aria-label="Notifications"
        >
          <span class="material-icons text-xl">notifications</span>
        </button>
        <div class="flex items-center gap-2 truncate text-sm">
          <img
            [src]="userImageUrl || defaultAvatar"
            (error)="onImageError($event)"
            alt="User"
            class="rounded-full object-cover object-center border-2 border-white/20 shadow-sm"
            style="width:45px;height:45px;object-fit:cover;"
          />
          <span class="truncate">{{ ProfileName }}</span>
        </div>
        <button
          type="button"
          class="rounded-md p-5 hover:bg-white/10"
          (click)="logout()"
          aria-label="Logout"
          title="Logout"
        >
          <span class="material-icons">logout</span>
        </button>
      </header>

      <main class="min-h-0 flex-1 overflow-y-auto bg-page p-4">
        <router-outlet />
      </main>
    </div>
  </div>
</ng-container>
