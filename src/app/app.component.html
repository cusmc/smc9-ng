<!-- Mobile drawer backdrop -->
<div
  *ngIf="isLoggedIn && !isLoginPage && sidenavOpen"
  class="fixed inset-0 z-40 bg-[#0f172a]/50 xl:hidden"
  (click)="sidenavOpen = false"
  aria-hidden="true"
></div>

<div class="flex h-screen overflow-hidden bg-page">

  <!-- Dual-panel nav: only when logged in -->
  <div
    *ngIf="isLoggedIn && !isLoginPage"
    class="fixed inset-y-0 left-0 z-50 flex transition-transform duration-200"
    [style.transform]="sidenavOpen ? 'translateX(0)' : 'translateX(-100%)'"
  >
    <app-module-rail
      [modules]="visibleModules"
      [activeModuleId]="activeModule?.id ?? null"
      (moduleSelected)="onModuleSelected($event)"
    />
    <app-sidebar
      [module]="activeModule"
      [open]="sidenavOpen"
      (closeMobile)="closeSidenavOnMobile()"
    />
  </div>

  <!-- Main content column -->
  <div
    class="flex min-w-0 flex-1 flex-col transition-[margin] duration-200"
    [style.margin-left.px]="(isLoggedIn && !isLoginPage && sidenavOpen) ? 276 : 0"
  >
    <!-- Top bar: only when logged in -->
    <header
      *ngIf="isLoggedIn && !isLoginPage"
      class="sticky top-0 z-30 flex h-14 shrink-0 items-center gap-2 border-b border-[#3670ee] bg-[#4680ff] px-2 text-white shadow-md sm:px-3"
    >
      <button
        type="button"
        class="rounded-md p-2 hover:bg-white/15"
        (click)="sidenavOpen = !sidenavOpen"
        aria-label="Toggle menu"
      >
        <span class="material-icons">menu</span>
      </button>
      <span class="flex-1"></span>
      <button
        type="button"
        class="rounded-md p-2 opacity-80 hover:bg-white/15"
        aria-label="Notifications"
      >
        <span class="material-icons text-xl">notifications</span>
      </button>

      <!-- Profile dropdown trigger -->
      <div class="relative">
        <button
          type="button"
          class="flex items-center gap-2 rounded-md px-2 py-1 hover:bg-white/15 text-sm"
          (click)="toggleProfileMenu($event)"
          aria-label="User menu"
        >
          <img
            [src]="userImageUrl || defaultAvatar"
            (error)="onImageError($event)"
            alt="User"
            class="rounded-full object-cover border-2 border-white/30 shadow-sm shrink-0"
            style="width:38px;height:38px;object-fit:cover;"
          />
          <span class="hidden sm:block truncate max-w-[160px]">{{ ProfileName }}</span>
          <span class="material-icons text-base opacity-70">expand_more</span>
        </button>

        <!-- Dropdown panel -->
        <div
          *ngIf="profileMenuOpen"
          class="absolute right-0 mt-1 w-52 rounded-md shadow-lg bg-white text-gray-800 ring-1 ring-black/10 z-50 overflow-hidden"
        >
          <div class="px-4 py-2 text-xs text-gray-400 border-b border-gray-100 truncate">{{ ProfileName }}</div>
          <a
            [routerLink]="['/profile/documents']"
            (click)="profileMenuOpen = false"
            class="flex items-center gap-2 px-4 py-2 text-sm hover:bg-gray-100 cursor-pointer"
          >
            <span class="material-icons text-base text-gray-500">folder_shared</span>
            My Documents
          </a>
          <div class="border-t border-gray-100"></div>
          <button
            type="button"
            (click)="logout()"
            class="flex w-full items-center gap-2 px-4 py-2 text-sm hover:bg-gray-100 text-red-600"
          >
            <span class="material-icons text-base">logout</span>
            Logout
          </button>
        </div>
      </div>
    </header>

    <!-- Server unavailable banner -->
    <div
      *ngIf="serverUnavailable"
      class="flex items-center gap-3 border-b border-amber-300 bg-amber-50 px-4 py-2.5 text-sm text-amber-900"
    >
      <span class="material-icons text-amber-500 text-[20px] shrink-0">cloud_off</span>
      <span class="flex-1">{{ serverErrorMsg }}</span>
      <button
        type="button"
        (click)="retryProfile()"
        class="inline-flex items-center gap-1 rounded-md border border-amber-400 bg-white px-3 py-1 text-xs font-medium text-amber-800 hover:bg-amber-100 shrink-0"
      >
        <span class="material-icons text-[14px]">refresh</span>
        Retry
      </button>
    </div>

    <!-- Single router-outlet — always in DOM so the router never loses its mount point -->
    <main
      class="min-h-0 flex-1 overflow-y-auto bg-page"
      [class.p-4]="isLoggedIn && !isLoginPage"
    >
      <router-outlet />
    </main>
  </div>

</div>
