<div class="p-6 bg-[#f0f2f5] min-h-screen">
  <div class="bg-white border border-[#eee] rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.06)]">
    <!-- Hero Header -->
    <div class="relative border-b border-[#e2e8f0] bg-gradient-to-r from-[#f7f9ff] via-white to-[#f8faff] px-6 pt-7 pb-5">
      <div class="absolute left-0 top-0 h-full w-1 bg-gradient-to-b from-[#4680ff] to-[#6b9bff]"></div>
      <!-- <p class="mb-1 text-xs font-medium uppercase tracking-[0.12em] text-[#2d8a7e]">Reports</p> -->
      <h2 class="font-serif text-2xl font-normal tracking-tight text-[#1e293b]">ElogBook Report</h2>
        <!-- <p class="mt-2 text-sm leading-relaxed text-[#6b6560]">
          Select a subject and student to generate the eLogBook report.
        </p> -->
    </div>

    <!-- Form -->
    <div class="p-6">
      <form [formGroup]="form" class="flex flex-wrap items-end gap-4">
        <div class="min-w-[200px] flex-1">
          <label class="mb-1 block text-sm text-[#6b6b6b]">Subject</label>
          <select formControlName="Subject_id"
                  class="w-full rounded-lg border border-[#e5e5e5] bg-white px-3 py-2.5 text-sm text-[#2d2d2d] transition focus:outline-none focus:ring-2 focus:ring-[#c8a96a]/50">
            <option [ngValue]="null">— Select —</option>
            <option *ngFor="let s of subjects" [ngValue]="s.Subject_id">{{ s.Subject_nm }}</option>
          </select>
        </div>
        <div class="min-w-[200px] flex-1">
          <label class="mb-1 block text-sm text-[#6b6b6b]">Student</label>
          <select formControlName="Studno"
                  class="w-full rounded-lg border border-[#e5e5e5] bg-white px-3 py-2.5 text-sm text-[#2d2d2d] transition focus:outline-none focus:ring-2 focus:ring-[#c8a96a]/50">
            <option [ngValue]="null">— Select —</option>
            <option *ngFor="let s of students" [ngValue]="s.Studno">{{ s.Stud_name }}</option>
          </select>
        </div>
        <button type="button" (click)="generate()" [disabled]="form.invalid || loading"
                class="inline-flex items-center gap-2 rounded-lg bg-[#4680ff] px-5 py-2.5 text-sm font-medium text-white shadow-sm transition hover:bg-[#3670ee] disabled:opacity-50">
          <span class="material-icons text-lg">picture_as_pdf</span>
          {{ loading ? 'Generating…' : 'Generate Report' }}
        </button>
      </form>
    </div>
  </div>
</div>
