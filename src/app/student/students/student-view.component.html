<div class="flex flex-col gap-4 p-6">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="material-icons text-[var(--app-primary)]">school</span>
      <h2 class="text-lg font-semibold text-[#333]">Student View</h2>
      <span class="rounded-full bg-[#f0ebe3] px-2.5 py-0.5 text-xs font-medium text-[#666]">
        {{ searchedData.length }} of {{ students.length }}
      </span>
    </div>
    <button
      type="button"
      class="inline-flex items-center gap-1.5 rounded-lg bg-[var(--app-primary)] px-4 py-2 text-sm font-medium text-white hover:bg-[var(--app-primary-dark)]"
      (click)="load()"
    >
      <span class="material-icons text-[18px]">refresh</span>
      Refresh
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex items-center gap-3 py-12 text-[#777]">
    <div class="h-7 w-7 animate-spin rounded-full border-2 border-[#e8dfd0] border-t-[#2d8a7e]"></div>
    <span class="text-sm">Loading students…</span>
  </div>

  <!-- Table -->
  <div *ngIf="!loading" class="overflow-x-auto rounded-xl border border-[#e2e8f0]">
    <table class="w-full min-w-[640px] border-collapse text-left text-sm">
      <thead>
        <tr class="border-b border-[#eee] bg-[#f8faff] text-[#666]">
          <th class="px-3 py-2.5 text-xs font-semibold uppercase tracking-wide">No.</th>
          <th class="px-3 py-2.5 text-xs font-semibold uppercase tracking-wide">Name</th>
          <th class="px-3 py-2.5 text-xs font-semibold uppercase tracking-wide">Status</th>
          <th class="px-3 py-2.5 text-xs font-semibold uppercase tracking-wide">Adm. Year</th>
          <th class="px-3 py-2.5 text-xs font-semibold uppercase tracking-wide">Actions</th>
        </tr>
        <!-- Column search -->
        <tr class="border-b border-[#e2e8f0] bg-[#f8faff]">
          <td class="px-3 py-1">
            <input [(ngModel)]="search.no"
              class="w-full rounded border border-[#e5e5e5] px-2 py-1 text-xs" placeholder="Search" />
          </td>
          <td class="px-3 py-1">
            <input [(ngModel)]="search.name"
              class="w-full rounded border border-[#e5e5e5] px-2 py-1 text-xs" placeholder="Search" />
          </td>
          <td class="px-3 py-1">
            <input [(ngModel)]="search.stat"
              class="w-full rounded border border-[#e5e5e5] px-2 py-1 text-xs" placeholder="Search" />
          </td>
          <td class="px-3 py-1">
            <input [(ngModel)]="search.admyear"
              class="w-full rounded border border-[#e5e5e5] px-2 py-1 text-xs" placeholder="Search" />
          </td>
          <td></td>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of pagedData" class="border-b border-[#f5f0e8] hover:bg-[#f8faff]">
          <td class="px-3 py-2 text-xs text-[#888] tabular-nums">{{ s.no }}</td>
          <td class="px-3 py-2 font-medium text-[#333]">{{ s.name }}</td>
          <td class="px-3 py-2">
            <span class="rounded-full px-2 py-0.5 text-xs font-semibold"
              [class]="s.stat.substring(0,1) === 'E'
                ? 'bg-green-50 text-green-700'
                : 'bg-gray-100 text-gray-600'">
              {{ s.stat.substring(0, 1) || '—' }}
            </span>
          </td>
          <td class="px-3 py-2 tabular-nums text-[#555]">{{ s.admyear ?? '—' }}</td>
          <td class="px-3 py-2">
            <div class="flex items-center gap-1">
              <button type="button"
                class="inline-flex items-center gap-1 rounded px-2 py-1 text-xs font-medium bg-blue-50 text-blue-700 hover:bg-blue-100"
                (click)="openLedger(s)" title="Ledger">
                <span class="material-icons text-[14px]">account_balance</span> Ledger
              </button>
              <button type="button"
                class="inline-flex items-center gap-1 rounded px-2 py-1 text-xs font-medium bg-teal-50 text-teal-700 hover:bg-teal-100"
                (click)="openDetails(s)" title="View Details">
                <span class="material-icons text-[14px]">person</span> View
              </button>
              <button type="button"
                class="inline-flex items-center gap-1 rounded px-2 py-1 text-xs font-medium bg-purple-50 text-purple-700 hover:bg-purple-100"
                (click)="openResult(s)" title="Result">
                <span class="material-icons text-[14px]">grade</span> Result
              </button>
              <button type="button"
                class="inline-flex items-center gap-1 rounded px-2 py-1 text-xs font-medium bg-amber-50 text-amber-700 hover:bg-amber-100"
                (click)="openUploadDocu(s)" title="Upload Documents">
                <span class="material-icons text-[14px]">upload_file</span> Docs
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="pagedData.length === 0">
          <td colspan="5" class="px-3 py-10 text-center text-sm text-[#999]">No records found.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div *ngIf="!loading && students.length > 0"
    class="flex items-center justify-between text-sm text-[#666]">
    <span>Page {{ currentPage }} of {{ totalPages }}</span>
    <div class="flex items-center gap-2">
      <button type="button"
        class="rounded border border-[#e5e5e5] px-3 py-1.5 text-xs hover:bg-[#f5f5f5] disabled:opacity-40"
        [disabled]="currentPage === 1" (click)="prevPage()">← Prev</button>
      <button type="button"
        class="rounded border border-[#e5e5e5] px-3 py-1.5 text-xs hover:bg-[#f5f5f5] disabled:opacity-40"
        [disabled]="currentPage === totalPages" (click)="nextPage()">Next →</button>
    </div>
  </div>
</div>
